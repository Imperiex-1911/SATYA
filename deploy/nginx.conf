server {
    listen 80;
    server_name _;   # Accept any hostname / IP — works with Elastic IP

    # ── React frontend (built files) ───────────────────────────────────────
    root /home/ubuntu/satya/frontend/dist;
    index index.html;

    # ── API proxy → FastAPI on :8000 ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeout — video download + analysis can take 2-3 minutes
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;

        # Allow large video URLs / response bodies
        client_max_body_size  10M;
    }

    # ── React Router — send all unknown routes to index.html ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip for faster frontend delivery ─────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
}
