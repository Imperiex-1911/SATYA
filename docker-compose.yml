services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: satya-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
    volumes:
      - ./backend:/app
      - ${USERPROFILE}/.aws:/root/.aws:ro
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  video-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: satya-video-worker
    command: ["python", "-m", "workers.video_worker.worker"]
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
      - ${USERPROFILE}/.aws:/root/.aws:ro
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
